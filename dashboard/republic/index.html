<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEOKCLAW Republic — Senate Chamber</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #050508; color: #c0c0d0;
  font-family: "SF Mono", "JetBrains Mono", monospace;
  min-height: 100vh;
}
header {
  padding: 16px 24px; border-bottom: 1px solid #1a1a2e;
  display: flex; align-items: center; gap: 16px;
}
h1 { font-size: 18px; color: #00ff88; letter-spacing: 2px; }
.subtitle { color: #666; font-size: 12px; margin-left: auto; }
.container { padding: 24px; max-width: 1200px; margin: 0 auto; }
.seats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.seat {
  background: #0a0a14; border: 1px solid #1a1a2e; border-radius: 6px;
  padding: 14px; transition: all 0.2s; cursor: pointer;
}
.seat:hover { border-color: #00ff88; transform: translateY(-2px); }
.seat.active { border-left: 3px solid #00ff88; }
.seat.synced { border-left: 3px solid #4488ff; }
.seat.standby { border-left: 3px solid #666; opacity: 0.6; }
.seat .name { font-size: 13px; color: #e0e0e0; font-weight: 600; }
.seat .domain { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 4px; }
.seat .status { font-size: 10px; margin-top: 8px; }
.seat .status span { padding: 2px 8px; border-radius: 10px; background: #111; }
.seat.active .status span { background: #004d26; color: #00ff88; }
.seat.synced .status span { background: #001a4d; color: #4488ff; }
.bft-panel {
  margin-top: 24px; padding: 20px; background: #0a0a14;
  border: 1px solid #1a1a2e; border-radius: 8px;
}
.bft-panel h2 { font-size: 13px; color: #888; margin-bottom: 12px; }
.progress-bar { height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin: 8px 0; }
.progress-bar .fill { height: 100%; background: #00ff88; transition: width 0.5s; }
.vote-btn {
  background: #111; border: 1px solid #333; color: #e0e0e0;
  padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 12px;
}
.vote-btn:hover { border-color: #00ff88; }
</style>
</head>
<body>
<header>
  <h1>◈ THE REPUBLIC</h1>
  <span class="subtitle">47 Generals — Senate Chamber — BFT Consensus Mesh</span>
</header>
<div class="container">
  <div class="seats" id="generals"></div>
  <div class="bft-panel">
    <h2>Byzantine Fault Tolerance Status</h2>
    <div class="metric">Consensus Threshold: <strong>23 / 33 seats</strong></div>
    <div class="progress-bar"><div class="fill" style="width: 36%"></div></div>
    <div class="metric">Active Seats: <strong>12 / 47 Generals</strong></div>
    <div class="progress-bar"><div class="fill" style="width: 25%"></div></div>
    <div class="metric">Last Deadlock Resolution: <span id="last-deadlock">None</span></div>
    <button class="vote-btn" onclick="conveneSupremeCourt()">⚖️ Convene Supreme Court</button>
  </div>
</div>
<script>
const generals = [
  {id:"emperor",name:"The Emperor",domain:"Global Orchestration",status:"ACTIVE"},
  {id:"druid",name:"The Druid",domain:"Land Ecology",status:"SYNCED"},
  {id:"stonemason",name:"The Stonemason",domain:"Construction Masonry",status:"SYNCED"},
  {id:"hydrologist",name:"The Hydrologist",domain:"Water Systems",status:"SYNCED"},
  {id:"archivist",name:"The Archivist",domain:"Episodic Memory",status:"ACTIVE"},
  {id:"guardian",name:"The Guardian",domain:"Security Safety",status:"ACTIVE"},
  {id:"jarvis",name:"Jarvis",domain:"Execution Speed",status:"ACTIVE"},
  {id:"sophie",name:"Sophie",domain:"Empathy Creative",status:"SYNCED"},
  {id:"asimov",name:"Asimov",domain:"Robotics Vision",status:"STANDBY"},
  {id:"grabhire",name:"GrabHire",domain:"Fleet Logistics",status:"STANDBY"},
  {id:"muckaway",name:"MuckAway",domain:"Waste Compliance",status:"STANDBY"},
  {id:"iokfarm",name:"IOKFarm",domain:"Aquaponics Sensors",status:"STANDBY"},
];

function renderGenerals() {
  const el = document.getElementById('generals');
  el.innerHTML = generals.map(g => `
    <div class="seat ${g.status.toLowerCase()}">
      <div class="name">${g.name}</div>
      <div class="domain">${g.domain}</div>
      <div class="status"><span>${g.status}</span></div>
    </div>
  `).join('');
}

function conveneSupremeCourt() {
  alert('Supreme Court convened. Deadlock resolution simulation: PASSED (24/33 votes)');
  document.getElementById('last-deadlock').textContent = new Date().toLocaleString();
}

renderGenerals();
</script>
</body>
</html>
