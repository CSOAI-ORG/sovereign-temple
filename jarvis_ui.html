<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Sovereign Voice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: #111118;
    border-bottom: 1px solid #1a1a2e;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo { font-size: 18px; font-weight: 700; color: #ffd700; letter-spacing: 2px; }
  .status-bar { display: flex; gap: 16px; font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .status-dot.green { background: #00ff00; }
  .status-dot.red { background: #ff0000; }
  .status-dot.yellow { background: #ffd700; }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

  .user-msg {
    align-self: flex-end;
    background: #1a3a5c;
    border-bottom-right-radius: 4px;
    color: #c0e0ff;
  }
  .jarvis-msg {
    align-self: flex-start;
    background: #1a1a2e;
    border-bottom-left-radius: 4px;
    border-left: 3px solid #ffd700;
  }
  .tool-msg {
    align-self: flex-start;
    background: #0d1a0d;
    border-left: 3px solid #00ff00;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #00ff00;
  }
  .meta { font-size: 11px; color: #666; margin-top: 6px; }

  /* Consciousness orb */
  .consciousness-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    background: #0d0d14;
    font-size: 12px;
    color: #888;
    border-top: 1px solid #1a1a2e;
  }
  .orb {
    width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; box-shadow: 0 0 12px #ffd700; } }

  /* Input area */
  #input-area {
    background: #111118;
    border-top: 1px solid #1a1a2e;
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  #text-input {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    border-radius: 24px;
    padding: 12px 20px;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
  }
  #text-input:focus { border-color: #ffd700; }
  #text-input::placeholder { color: #555; }

  /* Mic button */
  #mic-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid #ffd700;
    background: #1a1a2e;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  #mic-btn:hover { background: #2a2a3e; }
  #mic-btn.recording {
    background: #ff0000;
    border-color: #ff0000;
    animation: recording-pulse 1s infinite;
  }
  @keyframes recording-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  #mic-btn svg { width: 24px; height: 24px; fill: #ffd700; }
  #mic-btn.recording svg { fill: #fff; }

  #send-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: #ffd700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn svg { width: 20px; height: 20px; fill: #000; }

  /* Loading */
  .thinking {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
    align-self: flex-start;
  }
  .thinking .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ffd700;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>
</head>
<body>
  <header>
    <div class="logo">JARVIS</div>
    <div class="status-bar">
      <span><span class="status-dot" id="gpu-dot"></span>GPU</span>
      <span><span class="status-dot" id="sov3-dot"></span>SOV3</span>
      <span><span class="status-dot" id="whisper-dot"></span>STT</span>
      <span id="model-display" style="color: #ffd700;"></span>
    </div>
  </header>

  <div id="chat">
    <div class="jarvis-msg">
      Good day, Sir. Jarvis online. Speak or type — I'm listening with 40+ sovereign tools, dual-brain GPU routing, and 860+ memories at your service.
    </div>
  </div>

  <div class="consciousness-bar">
    <div class="orb"></div>
    <span id="consciousness-text">Loading consciousness...</span>
  </div>

  <div id="input-area">
    <button id="mic-btn" onclick="toggleRecording()" title="Hold to speak">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <input type="text" id="text-input" placeholder="Type a message or click mic to speak..." onkeydown="if(event.key==='Enter')sendText()">
    <button id="send-btn" onclick="sendText()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

<script>
const chat = document.getElementById('chat');
const textInput = document.getElementById('text-input');
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

// ─── Status polling ───
async function checkStatus() {
  try {
    const r = await fetch('/voice/status');
    const s = await r.json();
    document.getElementById('gpu-dot').className = `status-dot ${s.gpu_connected ? 'green' : 'red'}`;
    document.getElementById('sov3-dot').className = `status-dot ${s.sov3_connected ? 'green' : 'red'}`;
    document.getElementById('whisper-dot').className = `status-dot ${s.whisper_loaded ? 'green' : 'yellow'}`;
    if (s.gpu_models?.length) {
      document.getElementById('model-display').textContent = s.gpu_models.join(', ');
    }
    const c = s.consciousness || {};
    document.getElementById('consciousness-text').textContent =
      `${c.mode || '?'} | ${c.level || 0}% consciousness | ${c.emotion || '?'} | care: ${c.care || 0}`;
  } catch(e) {}
}
setInterval(checkStatus, 10000);
checkStatus();

// ─── Add message to chat ───
function addMessage(text, type, meta) {
  const div = document.createElement('div');
  div.className = `message ${type}-msg`;
  div.textContent = text;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  const t = document.getElementById('thinking');
  if (t) t.remove();
}

// ─── Send text message ───
async function sendText() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = '';
  addMessage(text, 'user');
  addThinking();

  try {
    const r = await fetch('/voice/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text})
    });
    const data = await r.json();
    removeThinking();

    if (data.tool_called) {
      addMessage(`🔧 ${data.tool_called}: ${(data.tool_result || '').substring(0, 200)}`, 'tool');
    }
    addMessage(data.response, 'jarvis', `${data.model} | ${data.consciousness?.mode || '?'}`);
  } catch(e) {
    removeThinking();
    addMessage(`Connection error: ${e.message}`, 'tool');
  }
}

// ─── Mic recording ───
async function toggleRecording() {
  const btn = document.getElementById('mic-btn');

  if (isRecording) {
    // Stop
    isRecording = false;
    btn.classList.remove('recording');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    return;
  }

  // Start recording
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: {sampleRate: 16000, channelCount: 1}});
    mediaRecorder = new MediaRecorder(stream, {mimeType: 'audio/webm'});
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, {type: 'audio/webm'});

      addMessage('🎤 [voice message]', 'user');
      addThinking();

      // Send to server
      const formData = new FormData();
      formData.append('audio', blob, 'recording.webm');

      try {
        const r = await fetch('/voice/listen', {method: 'POST', body: formData});
        const data = await r.json();
        removeThinking();

        // Show transcript
        if (data.text && data.text !== '[silence]') {
          addMessage(`Heard: "${data.text}"`, 'tool');
        }
        if (data.tool_called) {
          addMessage(`🔧 ${data.tool_called}: ${(data.tool_result || '').substring(0, 200)}`, 'tool');
        }
        addMessage(data.response, 'jarvis', `${data.model} | ${data.consciousness?.mode || '?'}`);
      } catch(e) {
        removeThinking();
        addMessage(`Error: ${e.message}`, 'tool');
      }
    };

    mediaRecorder.start();
    isRecording = true;
    btn.classList.add('recording');

    // Auto-stop after 15 seconds
    setTimeout(() => {
      if (isRecording) toggleRecording();
    }, 15000);

  } catch(e) {
    addMessage(`Mic error: ${e.message}. Use text input instead.`, 'tool');
  }
}

// ─── Keyboard shortcut ───
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && e.target !== textInput) {
    e.preventDefault();
    toggleRecording();
  }
});
</script>
</body>
</html>
