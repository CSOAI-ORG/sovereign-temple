<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEOKCLAW Side Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a; color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh; display: flex; flex-direction: column;
    }
    .header {
      padding: 16px; border-bottom: 1px solid #222;
      display: flex; align-items: center; gap: 10px;
    }
    .logo { font-weight: 700; font-size: 16px; color: #00ff88; }
    .subtitle { font-size: 11px; color: #666; margin-left: auto; }
    .chat {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg { max-width: 95%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .msg.user { align-self: flex-end; background: #1a3a2a; }
    .msg.assistant { align-self: flex-start; background: #1a1a2e; }
    .msg.assistant pre {
      background: #0a0a0a; padding: 10px; border-radius: 6px;
      overflow-x: auto; font-size: 12px; margin-top: 8px;
    }
    .input-area {
      padding: 16px; border-top: 1px solid #222;
      display: flex; gap: 10px;
    }
    textarea {
      flex: 1; background: #111; border: 1px solid #333;
      border-radius: 10px; padding: 12px; color: #e0e0e0;
      font-size: 14px; outline: none; resize: none; min-height: 44px; max-height: 120px;
    }
    textarea:focus { border-color: #00ff88; }
    button {
      background: #00ff88; color: #000; border: none;
      border-radius: 10px; padding: 12px 20px; font-weight: 600;
      cursor: pointer; font-size: 14px; align-self: flex-end;
    }
    .quick-actions {
      padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #222;
    }
    .chip {
      background: #111; border: 1px solid #333; color: #888;
      padding: 6px 12px; border-radius: 14px; font-size: 12px;
      cursor: pointer; transition: all 0.2s;
    }
    .chip:hover { border-color: #00ff88; color: #00ff88; }
    .source-badge {
      font-size: 10px; color: #00ff88; margin-top: 4px; opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">◈ MEOKCLAW</span>
    <span class="subtitle">Sovereign Intelligence</span>
  </div>
  <div class="quick-actions">
    <span class="chip" onclick="quickAsk('Summarize this page')">📄 Summarize</span>
    <span class="chip" onclick="quickAsk('Explain the main points')">💡 Explain</span>
    <span class="chip" onclick="quickAsk('Key takeaways?')">🎯 Key Points</span>
    <span class="chip" onclick="quickAsk('Translate to English')">🌐 Translate</span>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-area">
    <textarea id="msg-input" placeholder="Ask anything about this page..." rows="1"></textarea>
    <button id="btn-send">→</button>
  </div>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
