# ─── Sovereign extensions ────────────────────────────────────────────────────

[sovereign]
compliance_frameworks = [
  "EU AI Act (Art. 9, 10, 11, 12, 13, 14, 15)",
  "GDPR",
  "ISO 42001",
  "NIST AI RMF",
  "SOC 2",
  "Digital Omnibus (May 2026 amendments)",
]
oscal_components = [
  "eu-ai-act-compliance-hand-component",
  "fleet-compliance-monitor",
  "sigil-audit-trail",
]
sigil_chain = "meok-backend:/var/lib/sigil/compliance_hand.chain"
data_residency = "uk"
access_control = "council_oversight"