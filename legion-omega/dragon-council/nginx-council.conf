events { worker_connections 1024; }

http {
    upstream council_chamber { server council-chamber:8090; }
    upstream fast_edge       { server edge-councillor:8004; }
    upstream code_forge      { server forge-councillor:8002; }

    server {
        listen 80;

        # Full deliberation
        location /v1/council/ {
            proxy_pass http://council_chamber;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        # Fast reflex (Edge only)
        location /v1/fast/ {
            proxy_pass http://fast_edge/v1/;
            proxy_read_timeout 30s;
        }

        # Code tasks (Forge)
        location /v1/code/ {
            proxy_pass http://code_forge/v1/;
            proxy_read_timeout 120s;
        }

        location /health {
            return 200 "Dragon Council Active\n";
            access_log off;
        }
    }
}
