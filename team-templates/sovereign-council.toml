# ─────────────────────────────────────────────────────────────────────────
# 15. Coordination rules
# ─────────────────────────────────────────────────────────────────────────

# Per the ClawTeam hedge-fund pattern, the King MUST wait for all 12
# verdicts before signing. Veto power: Care Queen (V) and Watch Queen (XVI)
# can each single-handedly block a proposal that violates their mandate.
#
# Quorum: 2f+1 with f=floor((13-1)/3)=4, so we need 9 of 13 verdicts.
# Veto override: Care (V) and Watch (XVI) vetoes count as -2 each.
#
# SIGIL: every final verdict is Ed25519-signed via sov3_striving.sign_artifact
# and hash-chained to the sovereign-temple SIGIL ledger.

