<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEOKCLAW</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px; min-height: 480px;
      background: #0a0a0a; color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column;
    }
    .header {
      padding: 12px 16px; border-bottom: 1px solid #222;
      display: flex; align-items: center; gap: 8px;
    }
    .logo { font-weight: 700; font-size: 14px; color: #00ff88; }
    .status {
      margin-left: auto; font-size: 10px; padding: 2px 8px;
      border-radius: 10px; background: #222;
    }
    .status.online { background: #004d26; color: #00ff88; }
    .chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 90%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .msg.user { align-self: flex-end; background: #1a3a2a; }
    .msg.assistant { align-self: flex-start; background: #1a1a2e; }
    .input-area {
      padding: 12px; border-top: 1px solid #222;
      display: flex; gap: 8px;
    }
    input {
      flex: 1; background: #111; border: 1px solid #333;
      border-radius: 8px; padding: 10px 12px; color: #e0e0e0;
      font-size: 13px; outline: none;
    }
    input:focus { border-color: #00ff88; }
    button {
      background: #00ff88; color: #000; border: none;
      border-radius: 8px; padding: 10px 16px; font-weight: 600;
      cursor: pointer; font-size: 13px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .actions { padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      background: #111; border: 1px solid #333; color: #888;
      padding: 4px 10px; border-radius: 12px; font-size: 11px;
      cursor: pointer; transition: all 0.2s;
    }
    .chip:hover { border-color: #00ff88; color: #00ff88; }
    .typing { font-size: 11px; color: #666; padding: 0 4px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">◈ MEOKCLAW</span>
    <span class="status online" id="status">● Local</span>
  </div>
  <div class="actions">
    <span class="chip" id="btn-summarize">📄 Summarize Page</span>
    <span class="chip" id="btn-explain">❓ Explain Selection</span>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Ask anything..." autocomplete="off">
    <button id="btn-send">→</button>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
