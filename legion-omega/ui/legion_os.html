<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Legion OS v2.0 — War Room</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;}
    .os{display:grid;grid-template-columns:260px 1fr 320px;grid-template-rows:56px 1fr 180px;height:100vh;gap:8px;padding:8px;}
    /* Header */
    .hdr{grid-column:1/-1;background:rgba(30,41,59,.95);border:1px solid #334155;border-radius:10px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
    .logo{font-size:20px;font-weight:700;background:linear-gradient(90deg,#8B5CF6,#EF4444,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topstats{display:flex;gap:20px;font-size:13px;color:#94a3b8;}
    .dot{width:8px;height:8px;border-radius:50%;background:#10B981;display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    /* Character panel */
    .chars{background:rgba(30,41,59,.9);border:1px solid #334155;border-radius:10px;overflow-y:auto;padding:12px;}
    .ptitle{font-size:11px;letter-spacing:2px;color:#64748b;text-transform:uppercase;margin-bottom:10px;}
    .card{background:rgba(51,65,85,.5);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;}
    .card:hover,.card.sel{background:rgba(71,85,105,.8);transform:translateX(3px);}
    .card-row{display:flex;align-items:center;gap:8px;}
    .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:2px solid var(--c);}
    .cn{font-weight:600;font-size:13px;}
    .cr{font-size:10px;color:#94a3b8;text-transform:uppercase;}
    .lvbadge{background:linear-gradient(135deg,#FCD34D,#F59E0B);color:#000;padding:1px 5px;border-radius:3px;font-weight:700;font-size:10px;margin-left:auto;}
    .xpbar{height:2px;background:#334155;border-radius:2px;margin-top:6px;overflow:hidden;}
    .xpfill{height:100%;background:linear-gradient(90deg,#10B981,#34D399);transition:width .3s;}
    /* Viewport */
    .view{background:#0a0f1e;border:1px solid #334155;border-radius:10px;position:relative;overflow:hidden;}
    #canvas{position:absolute;top:0;left:0;width:100%;height:60%;}
    .ops{position:absolute;bottom:0;left:0;right:0;height:40%;background:rgba(15,23,42,.95);border-top:1px solid #334155;padding:12px;overflow-y:auto;}
    .task{background:rgba(51,65,85,.4);padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:6px;border-left:3px solid #10B981;display:flex;align-items:center;gap:8px;}
    .task.run{border-left-color:#F59E0B;animation:tpulse 2s infinite;}
    @keyframes tpulse{0%,100%{opacity:1;}50%{opacity:.7;}}
    /* Chat */
    .chat{background:rgba(30,41,59,.9);border:1px solid #334155;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
    .ctabs{display:flex;gap:4px;padding:8px;border-bottom:1px solid #334155;}
    .ctab{padding:5px 10px;background:rgba(51,65,85,.4);border-radius:5px;font-size:11px;cursor:pointer;transition:background .2s;}
    .ctab.on{background:#8B5CF6;}
    .msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
    .msg{display:flex;gap:8px;}
    .mav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:2px solid var(--mc);}
    .mbody{background:rgba(51,65,85,.5);padding:8px 10px;border-radius:8px;font-size:12px;line-height:1.4;max-width:200px;}
    .mname{font-size:10px;color:var(--mc);margin-bottom:3px;font-weight:600;}
    .cinput{padding:10px;border-top:1px solid #334155;display:flex;gap:8px;}
    .cinput input{flex:1;background:rgba(15,23,42,.8);border:1px solid #475569;border-radius:6px;padding:8px 12px;color:#e2e8f0;font-size:12px;outline:none;}
    .cinput input:focus{border-color:#8B5CF6;}
    .sbtn{background:#8B5CF6;border:none;border-radius:6px;padding:8px 14px;color:#fff;cursor:pointer;font-weight:600;transition:transform .1s;}
    .sbtn:hover{transform:scale(1.05);}
    /* Console */
    .con{grid-column:1/-1;background:#000;border:1px solid #1e293b;border-radius:10px;padding:10px;font-family:'Courier New',monospace;font-size:11px;overflow-y:auto;color:#10B981;}
    .cl{margin:2px 0;} .cl.e{color:#EF4444;} .cl.w{color:#F59E0B;} .cl.i{color:#3B82F6;}
    /* Achievement */
    #ach{position:fixed;top:72px;right:16px;width:240px;pointer-events:none;z-index:100;}
    .acht{background:linear-gradient(135deg,#F59E0B,#D97706);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;gap:10px;align-items:center;animation:slidein .4s ease;}
    @keyframes slidein{from{transform:translateX(300px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  </style>
</head>
<body>
<div class="os">
  <div class="hdr">
    <div class="logo">⚡ LEGION OS v2.0</div>
    <div class="topstats">
      <span><span class="dot"></span><span id="nodecount">9 Nodes</span></span>
      <span>🎖️ Level <span id="glevel">1</span></span>
      <span id="loadstat">Load: --</span>
    </div>
  </div>
  <div class="chars" id="chars"><div class="ptitle">👥 THE COUNCIL</div></div>
  <div class="view">
    <div id="canvas"></div>
    <div class="ops">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <b style="font-size:13px;">🎯 Operations</b>
        <span id="tcount" style="font-size:12px;color:#94a3b8;"></span>
      </div>
      <div id="tasks"></div>
    </div>
  </div>
  <div class="chat">
    <div class="ctabs">
      <div class="ctab on" onclick="switchTab('council',this)">Council</div>
      <div class="ctab" onclick="switchTab('logs',this)">Logs</div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="cinput">
      <input id="inp" placeholder="Command the Council…" onkeypress="if(event.key==='Enter')send()">
      <button class="sbtn" onclick="send()">➤</button>
    </div>
  </div>
  <div class="con" id="con">
    <div class="cl">[SYSTEM] Legion OS v2.0 initializing…</div>
  </div>
</div>
<div id="ach"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const CHARS = {};
let ws = null, selected = 'jarvis', tab = 'council';

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => log('[WS] Connected to Legion cluster', 'i');
  ws.onclose = () => { log('[WS] Disconnected — retrying…', 'w'); setTimeout(connect, 3000); };
  ws.onmessage = e => handle(JSON.parse(e.data));
}

function handle(d) {
  if (d.type === 'init') {
    buildChars(d.council);
    buildTopology(d.topology || []);
    addMsg('jarvis', '🎩', '#FCD34D', 'Jarvis', d.message || 'Council assembled.');
  } else if (d.type === 'chat') {
    addMsg(d.character, d.emoji||'🤖', d.color||'#fff', d.name||d.character, d.message);
  } else if (d.type === 'achievement') {
    showAch(d.title, d.description);
  } else if (d.type === 'topology') {
    buildTopology(d.nodes);
  } else if (d.type === 'task_assigned' || d.type === 'task_complete') {
    log(`[TASK] ${d.result || JSON.stringify(d)}`, 'i');
  }
}

// ─── Characters ───────────────────────────────────────────────────────────────
function buildChars(council) {
  const el = document.getElementById('chars');
  el.innerHTML = '<div class="ptitle">👥 THE COUNCIL</div>';

  Object.entries(council).forEach(([id, c]) => {
    CHARS[id] = c;
    const div = document.createElement('div');
    div.className = 'card'; div.id = `c-${id}`;
    div.style.setProperty('--c', c.color);
    div.onclick = () => selectChar(id);
    div.innerHTML = `
      <div class="card-row">
        <div class="av" style="--c:${c.color}">${c.emoji}</div>
        <div><div class="cn">${c.name}</div><div class="cr">${id}</div></div>
        <span class="lvbadge">Lv${c.level}</span>
      </div>
      <div style="font-size:10px;color:#94a3b8;margin-top:4px;">${c.tasks} tasks · ${c.online?'🟢 online':'⚪ offline'}</div>
      <div class="xpbar"><div class="xpfill" style="width:${(c.xp%1000)/10}%"></div></div>
    `;
    el.appendChild(div);
  });
}

function selectChar(id) {
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  document.getElementById(`c-${id}`)?.classList.add('sel');
  selected = id;
}

// ─── Three.js Topology ────────────────────────────────────────────────────────
function buildTopology(nodes) {
  const container = document.getElementById('canvas');
  if (container._renderer) { container._renderer.dispose(); container.innerHTML = ''; }

  const scene = new THREE.Scene();
  const w = container.clientWidth, h = container.clientHeight || 300;
  const camera = new THREE.PerspectiveCamera(60, w/h, 0.1, 100);
  const renderer = new THREE.WebGLRenderer({alpha:true,antialias:true});
  renderer.setSize(w,h);
  container.appendChild(renderer.domElement);
  container._renderer = renderer;

  const spheres = [];
  nodes.forEach(n => {
    const geo = new THREE.SphereGeometry(.6,32,32);
    const mat = new THREE.MeshPhongMaterial({color:n.color||0x8B5CF6, emissive:(n.color||0x8B5CF6), emissiveIntensity:.3});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(n.x||0, n.y||0, n.z||0);
    scene.add(mesh);
    spheres.push({mesh, id:n.id, online:n.online});

    if (!n.online) mesh.material.color.set(0x334155);
  });

  // Connections
  const lmat = new THREE.LineBasicMaterial({color:0x334155,transparent:true,opacity:.4});
  const conn = [[0,6],[6,1],[6,2],[6,3],[6,4],[6,5],[6,7],[1,2],[3,4],[4,5]];
  conn.forEach(([i,j]) => {
    if (!spheres[i]||!spheres[j]) return;
    const pts = [spheres[i].mesh.position, spheres[j].mesh.position];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lmat));
  });

  const amb = new THREE.AmbientLight(0xffffff,.4);
  const pt = new THREE.PointLight(0x8B5CF6, 1, 50);
  pt.position.set(0,5,5);
  scene.add(amb, pt);
  camera.position.set(0,2,10);

  (function animate() {
    requestAnimationFrame(animate);
    spheres.forEach((s,i) => { s.mesh.rotation.y += .008; });
    camera.position.x = Math.sin(Date.now()*.0003)*2;
    camera.lookAt(scene.position);
    renderer.render(scene, camera);
  })();
}

// ─── Chat ─────────────────────────────────────────────────────────────────────
function addMsg(cid, emoji, color, name, text) {
  const el = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className='msg'; d.style.setProperty('--mc',color);
  d.innerHTML=`<div class="mav" style="--mc:${color}">${emoji}</div><div class="mbody"><div class="mname">${name}</div>${text}</div>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  addMsg('user','👤','#94a3b8','You',txt);
  inp.value = '';
  if (ws && ws.readyState===1) ws.send(JSON.stringify({type:'command',target:selected,message:txt}));
}

function switchTab(t, btn) {
  tab = t;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// ─── Achievements ─────────────────────────────────────────────────────────────
function showAch(title, desc) {
  const el = document.getElementById('ach');
  const d = document.createElement('div');
  d.className='acht';
  d.innerHTML=`<span style="font-size:22px">🏆</span><div><b>${title}</b><div style="font-size:11px">${desc}</div></div>`;
  el.appendChild(d);
  setTimeout(()=>d.remove(), 4000);
}

// ─── Console ──────────────────────────────────────────────────────────────────
function log(msg, type='') {
  const el = document.getElementById('con');
  const d = document.createElement('div');
  d.className=`cl ${type}`;
  d.textContent=`[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  connect();
  // Poll status
  setInterval(async () => {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      const online = Object.values(d.council).filter(c=>c.online).length;
      document.getElementById('nodecount').textContent = `${online}/9 Nodes`;
    } catch {}
  }, 15000);
};
</script>
</body>
</html>
