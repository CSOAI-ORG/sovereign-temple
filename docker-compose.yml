version: '3.8'

services:
  # PostgreSQL for memory and audit logs
  postgres:
    image: postgres:15-alpine
    container_name: sovereign-postgres
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign
      POSTGRES_DB: sovereign_memory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign -d sovereign_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovereign-network

  # Weaviate for vector storage
  weaviate:
    image: semitechnologies/weaviate:1.24.0
    container_name: sovereign-weaviate
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-openai'
      ENABLE_MODULES: 'text2vec-openai'
      OPENAI_APIKEY: ${OPENAI_API_KEY:-}
      CLUSTER_HOSTNAME: 'sovereign-weaviate'
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovereign-network

  # Neo4j for identity graph and relationship persistence
  neo4j:
    image: neo4j:5.15-community
    container_name: sovereign-neo4j
    environment:
      NEO4J_AUTH: neo4j/sovereign
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - sovereign-network

  # Sovereign MCP Server
  sovereign-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-mcp
    ports:
      - "3100:3100"
    environment:
      - POSTGRES_DSN=postgresql://sovereign:sovereign@postgres:5432/sovereign_memory
      - WEAVIATE_URL=http://weaviate:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=sovereign
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - PYTHONPATH=/app
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ../sovereign-temple-live/coordination:/app/ext_coordination
      - ../sovereign-temple-live/agents:/app/ext_agents
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - sovereign-network
    restart: unless-stopped

volumes:
  postgres_data:
  weaviate_data:
  neo4j_data:

networks:
  sovereign-network:
    driver: bridge
