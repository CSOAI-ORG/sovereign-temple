<!DOCTYPE html>
<html>
<head>
    <title>Sovereign Voice</title>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #fff; }
        h1 { color: #00d4ff; text-align: center; }
        #status { text-align: center; padding: 15px; border-radius: 8px; margin: 20px 0; background: #333; }
        .connected { background: #0a3 !important; }
        .disconnected { background: #a33 !important; }
        button { display: block; width: 140px; height: 140px; margin: 30px auto; border-radius: 50%; border: none; background: #00d4ff; color: #fff; font-size: 50px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
        button:hover { transform: scale(1.05); }
        .recording { background: #f44 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        #chat { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; min-height: 200px; max-height: 400px; overflow-y: auto; }
        .msg { margin: 12px 0; padding: 12px; border-radius: 8px; }
        .you { background: rgba(0,212,255,0.15); border-left: 3px solid #00d4ff; }
        .sov { background: rgba(100,255,100,0.15); border-left: 3px solid #6f6; }
        .label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .error { color: #f66; }
    </style>
</head>
<body>
    <h1>🎙️ Sovereign Voice</h1>
    <div id="status">Connecting...</div>
    <button id="micBtn">🎤</button>
    <div id="chat">
        <div class="msg sov"><div class="label">Sovereign</div>Click the microphone and speak with me.</div>
    </div>

<script>
const status = document.getElementById('status');
const micBtn = document.getElementById('micBtn');
const chat = document.getElementById('chat');

let ws = null;
let recorder = null;
let isRecording = false;

function connect() {
    ws = new WebSocket('ws://localhost:8765');
    
    ws.onopen = () => {
        status.textContent = '🟢 Connected - Ready';
        status.className = 'connected';
    };
    
    ws.onclose = () => {
        status.textContent = '🔴 Disconnected - Retrying...';
        status.className = 'disconnected';
        setTimeout(connect, 2000);
    };
    
    ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        status.textContent = '⚠️ Connection error';
    };
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        console.log('Received:', data);
        
        if (data.recognized_text) {
            addMsg('You', data.recognized_text, 'you');
        }
        if (data.response_text) {
            addMsg('Sovereign', data.response_text, 'sov');
        }
        if (data.audio_base64) {
            playAudio(data.audio_base64);
        }
        if (data.error) {
            addMsg('Error', data.error, 'error');
        }
        
        // Reset button
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎤';
    };
}

function addMsg(who, text, cls) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = '<div class="label">' + who + '</div><div>' + text + '</div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function playAudio(base64) {
    try {
        const audio = new Audio('data:audio/mp3;base64,' + base64);
        audio.play().catch(e => console.log('Audio play failed:', e));
    } catch(e) {
        console.error('Audio error:', e);
    }
}

micBtn.onclick = async () => {
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            const chunks = [];
            
            recorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };
            
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'audio', audio_base64: base64 }));
                    } else {
                        addMsg('Error', 'Not connected to server', 'error');
                    }
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            
            recorder.start();
            isRecording = true;
            micBtn.classList.add('recording');
            micBtn.textContent = '⏹️';
            
        } catch (err) {
            alert('Microphone access required. Please allow microphone permission.');
            console.error(err);
        }
    } else {
        recorder.stop();
    }
};

// Connect on load
connect();
</script>
</body>
</html>
